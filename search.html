const box = document.getElementById('searchBox');
const results = document.getElementById('results');
const count = document.getElementById('resultCount');
function render(q) {
  q = q.trim().toLowerCase();
  if (!q) { count.textContent = '等待输入关键词。'; results.innerHTML = ''; return; }
  const terms = q.split(/\s+/).filter(Boolean);
  const matched = ITEMS.filter(item => terms.every(t => (item.title + ' ' + item.chapter + ' ' + item.type + ' ' + item.keywords).toLowerCase().includes(t))).slice(0, 100);
  count.textContent = '找到 ' + matched.length + ' 条结果。';
  results.innerHTML = '';
  matched.forEach(item => {
    const article = document.createElement('article');
    article.className = 'search-result';
    const a = document.createElement('a');
    a.href = item.url;
    a.textContent = item.title;
    const small = document.createElement('small');
    small.textContent = item.chapter + ' · ' + item.type;
    article.appendChild(a);
    article.appendChild(small);
    results.appendChild(article);
  });
}
box.addEventListener('input', () => render(box.value));
