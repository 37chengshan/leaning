 网络函数 = 输出 / 输入。 电压传递函数 电流传递函数 幅频特性 相频特性"}, {"chapter": "频率响应：从阻抗到波特图", "title": "电容阻抗和电感阻抗", "url": "chapters/ch4/index.html#t3", "keywords": "电容阻抗和电感阻抗 频率越高，电容越像短路；频率越高，电感越像开路。 Z_C=\\frac{1}{j\\omega C},\\quad Z_L=j\\omega L C 低频阻，高频通；L 低频通，高频阻。 RC 频响 RL 频响 阻抗计算 相量法"}, {"chapter": "频率响应：从阻抗到波特图", "title": "RC 低通滤波器", "url": "chapters/ch4/index.html#t4", "keywords": "RC 低通滤波器 低通滤波器让低频通过，让高频被衰减。最典型的是电阻串联、电容对地，输出取电容两端。 H(j\\omega)=\\frac{1}{1+j\\omega RC} RC 电容输出常是低通。 低通判断 截止频率 传递函数 波特图"}, {"chapter": "频率响应：从阻抗到波特图", "title": "RC 高通滤波器", "url": "chapters/ch4/index.html#t5", "keywords": "RC 高通滤波器 高通滤波器让高频通过，让低频被衰减。典型电路是电容串联、电阻对地，输出取电阻两端。 H(j\\omega)=\\frac{j\\omega RC}{1+j\\omega RC} RC 电阻输出常是高通。 高通判断 截止频率 分压法 波特图"}, {"chapter": "频率响应：从阻抗到波特图", "title": "RCL 串联谐振频率", "url": "chapters/ch4/index.html#t6", "keywords": "RCL 串联谐振频率 RCL 串联电路在某个频率下，电感和电容的反应抵消，总阻抗最小，电流最大。 \\omega_0=\\frac{1}{\\sqrt{LC}},\\quad f_0=\\frac{1}{2\\pi\\sqrt{LC}} 谐振频率只由 L、C 决定。 求谐振频率 判断谐振 RCL 参数计算"}, {"chapter": "频率响应：从阻抗到波特图", "title": "品质因数 Q 和带宽 BW", "url": "chapters/ch4/index.html#t7", "keywords": "品质因数 Q 和带宽 BW Q 值越大，谐振越尖锐，通频带越窄，选择频率的能力越强。 Q=\\frac{\\omega_0L}{R}=\\frac{1}{\\omega_0CR},\\quad BW=\\frac{\\omega_0}{Q} Q 越大，越挑频率。 求 Q 求带宽 选频能力判断 RCL 谐振"}, {"chapter": "频率响应：从阻抗到波特图", "title": "分贝 dB", "url": "chapters/ch4/index.html#t8", "keywords": "分贝 dB 分贝把倍率变成对数，方便画图。电压/电流增益用 20log。 G_{\\text{dB}}=20\\log_{10}|H| 电压增益 dB = 20log。 倍数转 dB dB 转倍数 波特图纵轴 截止点计算"}, {"chapter": "频率响应：从阻抗到波特图", "title": "波特图：频响的草图语言", "url": "chapters/ch4/index.html#t9", "keywords": "波特图：频响的草图语言 波特图用对数横轴表示频率，用 dB 纵轴表示增益。它能快速看出电路是低通、高通还是带通。 \\text{横轴：}\\log\\omega,\\quad \\text{纵轴：}20\\log_{10}|H(j\\omega)| 波特图是频率响应的地图。 画幅频波特图 判断斜率 截止频率 滤波器识别"}];const q=document.getElementById('q'),r=document.getElementById('results'),c=document.getElementById('count');function render(){let ts=q.value.trim().toLowerCase().split(/\s+/).filter(Boolean);if(!ts.length){c.textContent='等待输入。';r.innerHTML='';return}let m=ITEMS.filter(x=>ts.ever
